<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mɔkɛ Tester</title>
    <link rel="icon"
        href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext x='50' y='100' text-anchor='middle' font-size='150'%3E%E2%99%A1%3C/text%3E%3C/svg%3E">
    <style>
        @font-face {
            font-family: "Moke";
            src: url("MokeA_v8.otf");
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --text-color: #000000;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: "Moke", sans-serif;
            background: #ffffff;
            display: flex;
            flex-direction: column;
        }

        #header {
            width: 100%;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            color: #000000;
            font-size: 30px;
            position: relative;
        }

        #header-title {
            font-weight: 700;
        }

        #color-btn {
            text-decoration: underline;
            cursor: pointer;
            background: none;
            border: none;
            font-family: "Moke", sans-serif;
            font-size: 30px;
            color: inherit;
            padding: 0;
        }

        #canvas-area {
            flex: 1;
            display: flex;
            align-items: flex-start;
            /* ← was center, changed so scroll starts from top */
            justify-content: center;
            overflow-x: hidden;
            /* ← was overflow: hidden */
            overflow-y: auto;
            /* ← allows vertical scroll */
            padding: 0 24px 24px 24px;
        }

        #editor {
            width: 100%;
            min-height: 100%;
            outline: none;
            text-align: center;
            color: #000000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: visible;
            position: relative;

        }

        #editor div {
            white-space: pre;
            display: block;
            width: 100%;
            line-height: 1;
            margin-bottom: 5px;
        }

        #editor div:last-child {
            margin-bottom: 0;
        }

        #picker {
            display: none;
            position: absolute;
            top: 48px;
            right: 24px;
            background: #ffffff;
            border: 1px solid #cccccc;
            border-radius: 8px;
            padding: 16px 20px;
            width: 220px;
            z-index: 100;
            font-size: 20px;
        }

        #picker.open {
            display: block;
        }

        .color-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .color-row:last-child {
            margin-bottom: 0;
        }

        .color-row input[type=color] {
            width: 40px;
            height: 26px;
            border: none;
            padding: 0;
            cursor: pointer;
            background: none;
        }

        #editor.empty::before {
            content: "Type something here...";
            color: #aaaaaa;
            font-size: 48px;
            position: absolute;
            pointer-events: none;
            user-select: none;
        }
    </style>
</head>

<div id="tooltip" style="
    display: none;
    position: fixed;
    background: white;
    border: 1px solid #cccccc;
    border-radius: 6px;
    padding: 8px 12px;
    font-family: 'Moke', sans-serif;
    font-size: 50px;
    pointer-events: none;
    z-index: 999;
    max-width: 1000px;
    white-space: normal;
"></div>

<body>

    <div id="header">
        <span id="header-title">Mɔkɛ Tester</span>
        <button id="color-btn">change colours!</button>

        <div id="picker">
            <div id="preset-list"></div>
            <div style="border-top: 1px solid #cccccc; margin-top: 10px; padding-top: 10px;">
                <div class="color-row" style="flex-direction: column; align-items: flex-start; gap: 6px;">
                    <label>Stroke width: <span id="stroke-val">0</span>px</label>
                    <input type="range" id="stroke-width" min="0" max="200" value="0"
                        style="width: 100%; cursor: pointer;">
                </div>
            </div>
        </div>
    </div>

    <div id="canvas-area">
        <div id="editor" contenteditable="true" spellcheck="false" autocorrect="off" autocomplete="off"
            autocapitalize="off">
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
